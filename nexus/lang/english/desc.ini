name  = "Nexus"
genre = "Content"
desc  = "
    <br />This module is the default PHPBoost's module and allows you to easily start with this CMS.
    <br />It is based on the Item implemented in the kernel.
    <br />It allows you to create rich items and organize them into categories.
    <br />It contains all options available for content items, such as comments, contributions, deferred publications, keywords, rating, search, etc.
    <br />It is also compatible with the Home Page module.
"
